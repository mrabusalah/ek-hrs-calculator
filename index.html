<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Hours Calculator — Emirates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --em-red:       #C60C30;
            --em-red-dark:  #9B0923;
            --em-gold:      #C9A84C;
            --em-gold-lt:   #E2C97E;
            --em-navy:      #0D1B2A;
            --em-navy-mid:  #162840;
            --em-navy-card: rgba(14, 28, 45, 0.92);
            --em-text:      #F0EDE8;
            --em-muted:     #8FA0B3;
            --em-border:    rgba(201, 168, 76, 0.25);
            --em-shadow:    0 24px 64px rgba(0,0,0,0.6);
            --radius:       16px;
            --transition:   0.35s ease;
        }

        body.day-mode {
            --em-navy:      #F4F1EC;
            --em-navy-mid:  #EAE5DC;
            --em-navy-card: rgba(255,255,255,0.95);
            --em-text:      #1A1A1A;
            --em-muted:     #5A6070;
            --em-border:    rgba(198, 12, 48, 0.2);
            --em-shadow:    0 24px 64px rgba(0,0,0,0.15);
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--em-navy);
            color: var(--em-text);
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 15% 20%, rgba(198,12,48,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 85% 80%, rgba(201,168,76,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            transition: opacity var(--transition);
        }
        body.day-mode::before { opacity: 0.4; }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }
        body.day-mode::after { opacity: 0.3; }

        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px 40px;
        }

        .airline-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
            animation: fadeSlideDown 0.6s ease both;
        }
        .airline-logo {
            align-items: center;
            text-align: center;
            gap: 12px;
        }
        .logo-wordmark {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }
        .logo-wordmark .tagline {
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.22em;
            color: var(--em-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        #container {
            width: 100%;
            max-width: 620px;
            background: var(--em-navy-card);
            border: 1px solid var(--em-border);
            border-radius: var(--radius);
            box-shadow: var(--em-shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            transition: background var(--transition), box-shadow var(--transition), border-color var(--transition);
            animation: fadeSlideUp 0.7s ease both;
        }

        .card-accent {
            height: 4px;
            background: linear-gradient(90deg, var(--em-red) 0%, var(--em-gold) 60%, transparent 100%);
        }

        .card-body { padding: 32px 36px 36px; }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--em-text);
            letter-spacing: 0.02em;
            margin-bottom: 6px;
            transition: color var(--transition);
        }
        .card-subtitle {
            font-size: 0.78rem;
            color: var(--em-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .input-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--em-gold);
            margin-bottom: 8px;
            display: block;
        }
        #time-input {
            width: 100%;
            height: 130px;
            font-size: 0.88rem;
            font-family: 'Inter', sans-serif;
            padding: 14px 16px;
            border: 1px solid var(--em-border);
            border-radius: 10px;
            background: rgba(0,0,0,0.25);
            color: var(--em-text);
            resize: vertical;
            line-height: 1.7;
            transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            outline: none;
        }
        body.day-mode #time-input { background: rgba(0,0,0,0.04); }
        #time-input::placeholder { color: var(--em-muted); opacity: 0.7; }
        #time-input:focus {
            border-color: var(--em-gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }

        .divider {
            height: 1px;
            background: var(--em-border);
            margin: 28px 0;
        }

        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .result-tile {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--em-border);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        body.day-mode .result-tile { background: rgba(198,12,48,0.04); }
        .result-tile:hover {
            background: rgba(201,168,76,0.07);
            border-color: rgba(201,168,76,0.4);
            transform: translateY(-1px);
        }
        .result-tile::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 3px 0 0 3px;
            background: var(--em-gold);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .result-tile:hover::before { opacity: 1; }

        /* Outside office tile gets a different accent color */
        .result-tile.outside-tile::before { background: var(--em-red); }
        .result-tile.outside-tile .tile-icon { background: rgba(201,168,76,0.12); color: var(--em-gold); }
        .result-tile.outside-tile .tile-value { color: var(--em-gold-lt); }

        .tile-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(198,12,48,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--em-red);
            font-size: 1.1rem;
        }
        body.day-mode .tile-icon { background: rgba(198,12,48,0.1); }

        .tile-content { flex: 1; min-width: 0; }
        .tile-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--em-muted);
            margin-bottom: 4px;
        }
        .tile-value {
            font-size: 0.97rem;
            font-weight: 500;
            color: var(--em-text);
            word-break: break-word;
            transition: color var(--transition);
        }
        .tile-value.highlight { color: var(--em-gold-lt); }

        .day-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--em-gold);
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 20px;
            padding: 5px 12px;
            margin-top: 24px;
        }
        .day-badge::before {
            content: '';
            display: block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--em-gold);
            animation: pulse 2s infinite;
        }

        #night-mode-toggle {
            position: fixed;
            top: 20px; right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            background: var(--em-navy-card);
            color: var(--em-text);
            border: 1px solid var(--em-border);
            border-radius: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background var(--transition), border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            z-index: 100;
        }
        #night-mode-toggle:hover {
            border-color: var(--em-gold);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        #night-mode-toggle:active { transform: translateY(0) scale(0.97); }
        #night-mode-toggle svg {
            width: 16px; height: 16px;
            transition: transform 0.4s ease;
            color: var(--em-gold);
        }
        body.day-mode #night-mode-toggle svg { transform: rotate(180deg); }

        .card-footer {
            padding: 14px 36px;
            border-top: 1px solid var(--em-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--em-muted);
            letter-spacing: 0.08em;
        }
        .footer-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--em-red);
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.7); }
        }

        @media (max-width: 600px) {
            .card-body  { padding: 24px 20px 28px; }
            .card-footer { padding: 12px 20px; flex-direction: column; gap: 4px; text-align: center; }
            #night-mode-toggle { top: 12px; right: 12px; padding: 8px 12px; }
            #night-mode-toggle span { display: none; }
            .tile-value { font-size: 0.9rem; }
        }
        @media (max-width: 380px) {
            .airline-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <button id="night-mode-toggle" aria-label="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
        <span id="toggle-text">Day</span>
    </button>

    <div class="page-wrapper">
        <div class="airline-header">
            <div class="airline-logo">
                <img width="100" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Emirates_logo.svg/3840px-Emirates_logo.svg.png" alt="EK logo" />
                <div class="logo-wordmark">
                    <span class="tagline">Work Hours Tracker</span>
                </div>
            </div>
        </div>

        <div id="container">
            <div class="card-accent"></div>
            <div class="card-body">
                <div class="card-title">Shift Calculator</div>
                <div class="card-subtitle">Attendance &amp; Departure Tracker</div>

                <label class="input-label" for="time-input">Attendance Timestamps</label>
                <textarea id="time-input"
                    placeholder="Paste timestamps here — any format works:&#10;&#10;06/05/2026 06:29:42   (DLM-3F)	06/05/2026 07:13:17   (DLM-3F)&#10;06/05/2026 07:50:21   (DLM-3F)&#10;&#10;Or simply: 07:45  12:00  13:00  17:30"></textarea>

                <span class="day-badge" id="day-badge">Loading…</span>

                <div class="divider"></div>

                <div class="results-grid">
                    <div class="result-tile" id="exit-time-tile">
                        <div class="tile-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12H3M12 3l9 9-9 9"/>
                            </svg>
                        </div>
                        <div class="tile-content">
                            <div class="tile-label">Leaving Time</div>
                            <div class="tile-value highlight" id="exit-time">—</div>
                        </div>
                    </div>

                    <div class="result-tile" id="hours-worked-tile">
                        <div class="tile-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="tile-content">
                            <div class="tile-label">Time in Office</div>
                            <div class="tile-value" id="hours-worked">—</div>
                        </div>
                    </div>

                    <!-- NEW: Time outside office -->
                    <div class="result-tile outside-tile" id="time-outside-tile">
                        <div class="tile-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 8l4 4-4 4M3 12h18"/>
                                <path d="M3 6h6M3 18h6"/>
                            </svg>
                        </div>
                        <div class="tile-content">
                            <div class="tile-label">Time Outside Office</div>
                            <div class="tile-value" id="time-outside">—</div>
                        </div>
                    </div>

                    <div class="result-tile" id="time-left-tile">
                        <div class="tile-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="tile-content">
                            <div class="tile-label">Remaining Time</div>
                            <div class="tile-value" id="time-left">—</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <span><span class="footer-dot"></span>Not related to Emirates Group in any way</span>
                <span id="footer-clock">--:--:--</span>
            </div>
        </div>
    </div>

    <script>
        /**
         * Extract all timestamps from pasted text.
         * Supports:
         *   1. DD/MM/YYYY HH:MM:SS  (with optional trailing text like "(DLM-3F)")
         *   2. Plain HH:MM or HH:MM:SS
         * Returns sorted array of Date objects.
         */
        function extractTimestamps(text) {
            const timestamps = [];

            // Match full datetime: DD/MM/YYYY HH:MM:SS
            const fullRe = /(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})/g;
            let m;
            while ((m = fullRe.exec(text)) !== null) {
                // m[1]=DD, m[2]=MM, m[3]=YYYY, m[4]=HH, m[5]=MM, m[6]=SS
                const d = new Date(
                    parseInt(m[3]),      // year
                    parseInt(m[2]) - 1,  // month (0-based)
                    parseInt(m[1]),      // day
                    parseInt(m[4]),      // hour
                    parseInt(m[5]),      // minute
                    parseInt(m[6])       // second
                );
                timestamps.push(d);
            }

            // If no full timestamps found, try plain HH:MM or HH:MM:SS
            if (timestamps.length === 0) {
                const today = new Date();
                const shortRe = /\b(\d{1,2}):(\d{2})(?::(\d{2}))?\b/g;
                while ((m = shortRe.exec(text)) !== null) {
                    const d = new Date(
                        today.getFullYear(),
                        today.getMonth(),
                        today.getDate(),
                        parseInt(m[1]),
                        parseInt(m[2]),
                        m[3] ? parseInt(m[3]) : 0
                    );
                    timestamps.push(d);
                }
            }

            // Sort chronologically
            timestamps.sort((a, b) => a - b);
            return timestamps;
        }

        function formatDuration(totalMs) {
            if (totalMs <= 0) return '0 minutes';
            const totalSec = Math.floor(totalMs / 1000);
            const h = Math.floor(totalSec / 3600);
            const min = Math.floor((totalSec % 3600) / 60);
            const sec = totalSec % 60;
            const parts = [];
            if (h > 0) parts.push(`${h} hour${h !== 1 ? 's' : ''}`);
            if (min > 0) parts.push(`${min} minute${min !== 1 ? 's' : ''}`);
            if (sec > 0 || parts.length === 0) parts.push(`${sec} second${sec !== 1 ? 's' : ''}`);
            return parts.join(' ');
        }

        function parseInput() {
            const today = new Date();
            const isFriday = today.getDay() === 5;
            const requiredMs = (isFriday ? 6.5 : 8.5) * 60 * 60 * 1000;

            const inputText = document.getElementById('time-input').value.trim();
            const exitEl    = document.getElementById('exit-time');
            const workedEl  = document.getElementById('hours-worked');
            const timeLeftEl= document.getElementById('time-left');
            const outsideEl = document.getElementById('time-outside');

            if (!inputText) {
                [exitEl, workedEl, timeLeftEl, outsideEl].forEach(el => el.textContent = '—');
                return;
            }

            const timestamps = extractTimestamps(inputText);

            if (timestamps.length === 0) {
                [exitEl, workedEl, timeLeftEl, outsideEl].forEach(el => el.textContent = '—');
                return;
            }

            const now = new Date();
            const isOdd = timestamps.length % 2 !== 0; // last record = currently inside

            let totalInsideMs  = 0;  // time worked (in office)
            let totalOutsideMs = 0;  // time outside between sessions
            let lastInTime     = null;

            // Process pairs: even index = IN, odd index = OUT
            for (let i = 0; i < timestamps.length; i++) {
                if (i % 2 === 0) {
                    // IN timestamp
                    if (i > 0) {
                        // Gap between previous OUT and this IN = outside time
                        totalOutsideMs += timestamps[i] - timestamps[i - 1];
                    }
                    lastInTime = timestamps[i];
                } else {
                    // OUT timestamp
                    totalInsideMs += timestamps[i] - timestamps[i - 1];
                }
            }

            // If currently inside (odd count), add time from last IN to now
            if (isOdd && lastInTime) {
                totalInsideMs += now - lastInTime;
            }

            // ── Time in office ──
            workedEl.textContent = formatDuration(totalInsideMs);

            // ── Time outside office ──
            // Only show if there was at least one OUT event followed by an IN
            if (totalOutsideMs > 0) {
                outsideEl.textContent = formatDuration(totalOutsideMs);
            } else {
                outsideEl.textContent = timestamps.length >= 2 ? '0 minutes' : '—';
            }

            // ── Remaining time & expected exit ──
            // Departure = first IN timestamp + required shift (8h30 or 6h30)
            // Outside gaps are NOT subtracted — pure wall-clock from first swipe.
            const firstInTime = timestamps[0];
            const expectedExit = new Date(firstInTime.getTime() + requiredMs);
            const remainingMs = expectedExit - now;

            if (remainingMs <= 0) {
                exitEl.textContent = 'Requirement met ✓';
                timeLeftEl.textContent = '0 minutes remaining';
            } else {
                exitEl.textContent = expectedExit.toLocaleTimeString([], {
                    hour: '2-digit', minute: '2-digit', hour12: true
                });
                timeLeftEl.textContent = formatDuration(remainingMs);
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('time-input').addEventListener('input', parseInput);
            setInterval(parseInput, 1000);

            document.getElementById('night-mode-toggle').addEventListener('click', toggleNightMode);
            enableNightMode();
            updateDayBadge();
        });

        function updateDayBadge() {
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const today = new Date();
            const isFriday = today.getDay() === 5;
            const badge = document.getElementById('day-badge');
            if (badge) {
                badge.textContent = isFriday
                    ? 'Friday — 6h 30m shift'
                    : `${days[today.getDay()]} — 8h 30m shift`;
            }
        }

        function toggleNightMode() {
            document.body.classList.toggle('day-mode');
            const isDay = document.body.classList.contains('day-mode');
            localStorage.setItem('nightMode', isDay ? 'disabled' : 'enabled');
            document.getElementById('toggle-text').textContent = isDay ? 'Night' : 'Day';
        }

        function enableNightMode() {
            if (localStorage.getItem('nightMode') === 'disabled') {
                document.body.classList.add('day-mode');
                document.getElementById('toggle-text').textContent = 'Night';
            }
        }

        // Live footer clock
        function updateClock() {
            const el = document.getElementById('footer-clock');
            if (el) el.textContent = new Date().toLocaleTimeString([], {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
