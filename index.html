
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Hours Calculator — Emirates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Design tokens ─────────────────────────────────────── */
        :root {
            --em-red:       #C60C30;
            --em-red-dark:  #9B0923;
            --em-gold:      #C9A84C;
            --em-gold-lt:   #E2C97E;
            --em-navy:      #0D1B2A;
            --em-navy-mid:  #162840;
            --em-navy-card: rgba(14, 28, 45, 0.92);
            --em-text:      #F0EDE8;
            --em-muted:     #8FA0B3;
            --em-border:    rgba(201, 168, 76, 0.25);
            --em-shadow:    0 24px 64px rgba(0,0,0,0.6);
            --radius:       16px;
            --transition:   0.35s ease;
        }

        /* ── Day-mode overrides ─────────────────────────────────── */
        body.day-mode {
            --em-navy:      #F4F1EC;
            --em-navy-mid:  #EAE5DC;
            --em-navy-card: rgba(255,255,255,0.95);
            --em-text:      #1A1A1A;
            --em-muted:     #5A6070;
            --em-border:    rgba(198, 12, 48, 0.2);
            --em-shadow:    0 24px 64px rgba(0,0,0,0.15);
        }

        /* ── Base ───────────────────────────────────────────────── */
        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: var(--em-navy);
            color: var(--em-text);
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        /* ── Animated background ────────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 15% 20%, rgba(198,12,48,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 85% 80%, rgba(201,168,76,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            transition: opacity var(--transition);
        }
        body.day-mode::before { opacity: 0.4; }

        /* ── Tarmac grid overlay ────────────────────────────────── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }
        body.day-mode::after { opacity: 0.3; }

        /* ── Layout ─────────────────────────────────────────────── */
        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px 40px;
        }

        /* ── Header strip ───────────────────────────────────────── */
        .airline-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
            animation: fadeSlideDown 0.6s ease both;
        }
        .airline-logo {
            align-items: center;
            text-align: center;
            gap: 12px;
        }
        .logo-emblem {
            width: 52px;
            height: 52px;
            filter: drop-shadow(0 2px 8px rgba(198,12,48,0.5));
        }
        .logo-wordmark {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }
        .logo-wordmark .brand {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--em-gold);
            text-transform: uppercase;
        }
        .logo-wordmark .tagline {
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.22em;
            color: var(--em-muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── Main card ──────────────────────────────────────────── */
        #container {
            width: 100%;
            max-width: 620px;
            background: var(--em-navy-card);
            border: 1px solid var(--em-border);
            border-radius: var(--radius);
            box-shadow: var(--em-shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            transition: background var(--transition), box-shadow var(--transition), border-color var(--transition);
            animation: fadeSlideUp 0.7s ease both;
        }

        /* ── Card top accent bar ────────────────────────────────── */
        .card-accent {
            height: 4px;
            background: linear-gradient(90deg, var(--em-red) 0%, var(--em-gold) 60%, transparent 100%);
        }

        /* ── Card inner padding ─────────────────────────────────── */
        .card-body {
            padding: 32px 36px 36px;
        }

        /* ── Card title ─────────────────────────────────────────── */
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--em-text);
            letter-spacing: 0.02em;
            margin-bottom: 6px;
            transition: color var(--transition);
        }
        .card-subtitle {
            font-size: 0.78rem;
            color: var(--em-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        /* ── Input section ──────────────────────────────────────── */
        .input-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--em-gold);
            margin-bottom: 8px;
            display: block;
        }
        #time-input {
            width: 100%;
            height: 130px;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            padding: 14px 16px;
            border: 1px solid var(--em-border);
            border-radius: 10px;
            background: rgba(0,0,0,0.25);
            color: var(--em-text);
            resize: vertical;
            line-height: 1.7;
            transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            outline: none;
        }
        body.day-mode #time-input {
            background: rgba(0,0,0,0.04);
        }
        #time-input::placeholder { color: var(--em-muted); opacity: 0.7; }
        #time-input:focus {
            border-color: var(--em-gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
        }

        /* ── Divider ────────────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--em-border);
            margin: 28px 0;
        }

        /* ── Results grid ───────────────────────────────────────── */
        .results-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Individual result tiles ────────────────────────────── */
        .result-tile {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--em-border);
            border-radius: 12px;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        body.day-mode .result-tile {
            background: rgba(198,12,48,0.04);
        }
        .result-tile:hover {
            background: rgba(201,168,76,0.07);
            border-color: rgba(201,168,76,0.4);
            transform: translateY(-1px);
        }
        .result-tile::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            border-radius: 3px 0 0 3px;
            background: var(--em-gold);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .result-tile:hover::before { opacity: 1; }

        .tile-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(198,12,48,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--em-red);
            font-size: 1.1rem;
        }
        body.day-mode .tile-icon { background: rgba(198,12,48,0.1); }

        .tile-content {
            flex: 1;
            min-width: 0;
        }
        .tile-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--em-muted);
            margin-bottom: 4px;
        }
        .tile-value {
            font-size: 0.97rem;
            font-weight: 500;
            color: var(--em-text);
            word-break: break-word;
            transition: color var(--transition);
        }
        .tile-value.highlight { color: var(--em-gold-lt); }

        /* ── Day schedule note ──────────────────────────────────── */
        .day-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--em-gold);
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.25);
            border-radius: 20px;
            padding: 5px 12px;
            margin-top: 24px;
        }
        .day-badge::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--em-gold);
            animation: pulse 2s infinite;
        }

        /* ── Theme toggle ───────────────────────────────────────── */
        #night-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 16px;
            background: var(--em-navy-card);
            color: var(--em-text);
            border: 1px solid var(--em-border);
            border-radius: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background var(--transition), border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            z-index: 100;
        }
        #night-mode-toggle:hover {
            border-color: var(--em-gold);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        #night-mode-toggle:active { transform: translateY(0) scale(0.97); }
        #night-mode-toggle svg {
            width: 16px;
            height: 16px;
            transition: transform 0.4s ease;
            color: var(--em-gold);
        }
        body.day-mode #night-mode-toggle svg { transform: rotate(180deg); }

        /* ── Footer ─────────────────────────────────────────────── */
        .card-footer {
            padding: 14px 36px;
            border-top: 1px solid var(--em-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--em-muted);
            letter-spacing: 0.08em;
        }
        .footer-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--em-red);
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* ── Animations ─────────────────────────────────────────── */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.7); }
        }

        /* ── Responsive ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            .card-body  { padding: 24px 20px 28px; }
            .card-footer { padding: 12px 20px; flex-direction: column; gap: 4px; text-align: center; }
            .logo-wordmark .brand { font-size: 1.25rem; }
            #night-mode-toggle { top: 12px; right: 12px; padding: 8px 12px; }
            #night-mode-toggle span { display: none; }
            .tile-value { font-size: 0.9rem; }
        }
        @media (max-width: 380px) {
            .airline-header { flex-direction: column; text-align: center; }
        }
    </style>
    <script>
        function parseInput() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const isFriday = dayOfWeek === 5;

            const requiredHours = isFriday ? 6 : 8;
            const requiredMinutes = isFriday ? 30 : 30;
            let totalWorkedMinutes = 0;
            let lastInTime = null;
            let firstInTime = null;
            let lastExitTime = null;

            const inputText = document.getElementById("time-input").value.trim();
            if (!inputText) return;

            const lines = inputText.split('\n');
            let timestamps = [];
            const todayDate = today.toISOString().split('T')[0];

            lines.forEach(line => {
                const fullMatch = line.match(/\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}:\d{2}/g);
                const shortMatch = line.match(/\b\d{1,2}:\d{2}\b/g);

                if (fullMatch) {
                    timestamps.push(...fullMatch.map(ts => ts.replace(/(\d{2})\/(\d{2})\/(\d{4})/, '$3-$2-$1')));
                } else if (shortMatch) {
                    shortMatch.forEach(time => {
                        timestamps.push(`${todayDate} ${time}:00`);
                    });
                }
            });
console.log("timestamps", timestamps)
if(timestamps.length % 2 == 0) {
    for (let i = 0; i < timestamps.length; i+= 2) {
                const inTime = new Date(timestamps[i]);
                console.log("inTime", inTime)
                if (!firstInTime || inTime < firstInTime) {
                    firstInTime = inTime;
                }
                if (i + 1 < timestamps.length) {
                    const outTime = new Date(timestamps[i + 1]);
                    totalWorkedMinutes += (outTime - inTime) / (1000 * 60);
                    console.log("totalWorkedMinutes", totalWorkedMinutes)
                    lastExitTime = outTime;
                } else {
                    lastInTime = inTime;
                }
            }
}else{
    for (let i = 0; i < timestamps.length; i += 2) {
                const inTime = new Date(timestamps[i]);
                if (!firstInTime || inTime < firstInTime) {
                    firstInTime = inTime;
                }
                if (i + 1 < timestamps.length) {
                    const outTime = new Date(timestamps[i + 1]);
                    totalWorkedMinutes += (outTime - inTime) / (1000 * 60);

                } else {
                    lastInTime = inTime;
                }
            }
}


            const remainingMinutes = (requiredHours * 60 + requiredMinutes) - totalWorkedMinutes;
            console.log("remainingMinutes", remainingMinutes)
            let exitTimeText = "-";
            let hoursWorkedText = "";
            let timeLeftText = "-";

            if (firstInTime) {
                const now = new Date();
                const workedSeconds = (now - firstInTime) / 1000;
                const hours = Math.floor(workedSeconds / 3600);
                const minutes = Math.floor((workedSeconds % 3600) / 60);
                const seconds = Math.floor(workedSeconds % 60);
                hoursWorkedText = `${hours} hours ${minutes} minutes ${seconds} seconds`;
            }

            if (lastInTime && remainingMinutes > 0) {
                let expectedExitTime = new Date(lastInTime);
                expectedExitTime.setMinutes(expectedExitTime.getMinutes() + remainingMinutes);
                exitTimeText = expectedExitTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
                const now = new Date();
                const diff = expectedExitTime.getTime() - now.getTime();
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                timeLeftText = `${hours} hours ${minutes} minutes ${seconds} seconds`;
            }
            if (timestamps.length % 2 == 0 && remainingMinutes > 0 && lastExitTime) {

                let expectedExitTime = new Date(lastExitTime);
                expectedExitTime.setMinutes(expectedExitTime.getMinutes() + remainingMinutes);
                exitTimeText = "Already Left Office, Please check in to complete the remaining hours";
                const now = new Date();
                const diff = expectedExitTime.getTime() - now.getTime();
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                timeLeftText = `${hours} hours ${minutes} minutes ${seconds} seconds`;
            }
            document.getElementById("exit-time").textContent = exitTimeText || "-";
            document.getElementById("hours-worked").textContent = hoursWorkedText || "-";
            document.getElementById("time-left").textContent = timeLeftText || "-";
        }

        document.addEventListener("DOMContentLoaded", function() {
            const inputField = document.getElementById("time-input");
            inputField.addEventListener("input", parseInput);
            setInterval(parseInput, 1000);

            const nightModeToggle = document.getElementById('night-mode-toggle');
            nightModeToggle.addEventListener('click', toggleNightMode);

            if (localStorage.getItem('nightMode') === 'enabled') {
                enableNightMode();
            }

            updateDayBadge();
        });

        function updateDayBadge() {
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const today = new Date();
            const dayName = days[today.getDay()];
            const isFriday = today.getDay() === 5;
            const badge = document.getElementById('day-badge');
            if (badge) {
                badge.textContent = isFriday
                    ? `Friday — 6h 30m shift`
                    : `${dayName} — 8h 30m shift`;
            }
        }

        function toggleNightMode() {
            const body = document.body;
            const toggleText = document.getElementById('toggle-text');
            const moonIcon = document.getElementById('night-mode-toggle').querySelector('svg');

            body.classList.toggle('day-mode');

            if (body.classList.contains('day-mode')) {
                localStorage.setItem('nightMode', 'disabled');
                toggleText.textContent = 'Night';
            } else {
                localStorage.setItem('nightMode', 'enabled');
                toggleText.textContent = 'Day';
            }
        }

        function enableNightMode() {
            // "nightMode enabled" means user previously set dark → do nothing (dark is default)
            // "nightMode disabled" means user switched to day
            if (localStorage.getItem('nightMode') === 'disabled') {
                document.body.classList.add('day-mode');
                document.getElementById('toggle-text').textContent = 'Night';
            }
        }
    </script>
</head>
<body>
    <!-- Theme Toggle -->
    <button id="night-mode-toggle" aria-label="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
        <span id="toggle-text">Day</span>
    </button>

    <div class="page-wrapper">
        <!-- Header -->
        <div class="airline-header">
            <div class="airline-logo">
                <img width="100" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Emirates_logo.svg/3840px-Emirates_logo.svg.png" alt="EK logo" />
                <div class="logo-wordmark">
                    <span class="tagline">Work Hours Tracker</span>
                </div>
            </div>
        </div>

        <!-- Main Card -->
        <div id="container">
            <div class="card-accent"></div>
            <div class="card-body">
                <div class="card-title">Shift Calculator</div>
                <div class="card-subtitle">Attendance &amp; Departure Tracker</div>

                <label class="input-label" for="time-input">Attendance Timestamps</label>
                <textarea id="time-input"
                    placeholder="Paste timestamps here&#10;DD/MM/YYYY HH:MM:SS  or  HH:MM&#10;&#10;e.g.  07:45&#10;      12:00  13:00  17:30"></textarea>

                <span class="day-badge" id="day-badge">Loading…</span>

                <div class="divider"></div>

                <!-- Results -->
                <div class="results-grid">
                    <div class="result-tile" id="exit-time-tile">
                        <div class="tile-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12H3M12 3l9 9-9 9"/>
                            </svg>
                        </div>
                        <div class="tile-content">
                            <div class="tile-label">Departure Gate</div>
                            <div class="tile-value highlight" id="exit-time">—</div>
                        </div>
                    </div>

                    <div class="result-tile" id="hours-worked-tile">
                        <div class="tile-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                        </div>
                        <div class="tile-content">
                            <div class="tile-label">Time in Office</div>
                            <div class="tile-value" id="hours-worked">—</div>
                        </div>
                    </div>

                    <div class="result-tile" id="time-left-tile">
                        <div class="tile-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
                                <path d="M12 6v6l4 2"/>
                            </svg>
                        </div>
                        <div class="tile-content">
                            <div class="tile-label">Remaining Flight Time</div>
                            <div class="tile-value" id="time-left">—</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <span><span class="footer-dot"></span>Emirates Group · Internal Tool</span>
                <span id="footer-clock">--:--:--</span>
            </div>
        </div>
    </div>

    <script>
        // Live clock in footer
        function updateClock() {
            const el = document.getElementById('footer-clock');
            if (el) el.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true});
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
